<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}
body {
    font-family: Arial, sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    margin: 0;
  background-color: #033751;
}
header{
    display:flex;
    justify-content:space-between;
    align-items: center;
    background-color: white;
    padding: 15px;
    position: absolute;
    top:0;
    left:50%;
    transform: translate(-50%);
    width: 80%;
    border-radius: 10px;
    color:white;
}
header img{
    height: 50px;
    margin-left: 10px;
    width: 50px;
    border-radius: 50%;
}
header h1{
    color:black;
    margin:0;
    font-size:30px;
}
.next-button{
    display: flex-end;
    padding: 12px 24px;
    font-size: 18px;
    color: aliceblue;
    background: #007bff;
    border:none;
    border-radius: 5px;
    text-decoration: none;
    cursor: pointer;
    transition: 0.3s;
}
.next-button:hover{
    background-color:  rgb(4, 30, 53);
    transform: scale(1.1);
}

.container {
    text-align: center;
    width: 90%;
    max-width: 1200px;
}
.heading {
    font-size: 3rem;
    margin-bottom: 2px;
    text-shadow: 2px 2px 4px black;
    color:beige;
}
.grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(210px, 1fr));
    gap: 20px;
    margin-bottom: 40px;
}
.image-item {
    position: relative;
    overflow: hidden;
    border-radius: 10px; 
    box-shadow: 0 4px 8px rgba(0, 0, 0, 0.3);
}
.image-item img {
    width: 100%;
    height: auto;
    transition: transform 0.3s ease;
    border-radius: 10px;
}
.overlay {
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    background: rgba(0, 0, 0, 0.6);
    color: white;
    display: flex;
    justify-content: center;
    align-items: center;
    opacity: 0;
    transition: opacity 0.3s ease;
    font-size: 1.5rem;
    text-transform: uppercase;
}

.image-item:hover .overlay {
    opacity: 1;
}
.image-btn {
    position: absolute;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    background-color: #007bff;
    color: white;
    border: none;
    padding: 10px 20px;
    font-size: 1rem;
    cursor: pointer;
    border-radius: 5px;
    opacity: 0;
    transition: opacity 0.3s ease, transform 0.3s ease;
}

.image-item:hover .image-btn {
    opacity: 1;
    transform: translateX(-50%) scale(1.1);
}
.image-item:hover img {
    transform: scale(1.1); 
}
@media (max-width: 600px) {
    .heading {
        font-size: 2rem;
    }

    .grid {
        grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); 
    }
}

</style>
